version: 1
backend:
    phases:
        build:
            commands:
                - 'corepack enable'
                - 'npm install --frozen-lockfile'
                - 'npm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID'
frontend:
    phases:
        build:
            commands:
                - 'npm run build'
    artifacts:
        baseDirectory: dist
        files:
            - '**/*'
    cache:
        paths:
            - 'node_modules/**/*'

